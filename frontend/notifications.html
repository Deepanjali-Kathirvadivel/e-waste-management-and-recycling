<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Green Era Recyclers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Green Era Recyclers</a>
      <div class="d-flex align-items-center gap-3">
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i>My Profile</a></li>
            <li><a class="dropdown-item" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4" style="margin-top:70px">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold mb-0"><i class="bi bi-bell me-2 text-green"></i>Notifications</h4>
      <div>
        <button class="btn btn-sm btn-outline-green me-2" onclick="markAllRead()"><i class="bi bi-check2-all me-1"></i>Mark All Read</button>
        <button class="btn btn-sm btn-outline-danger" onclick="clearRead()"><i class="bi bi-trash me-1"></i>Clear Read</button>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-0" id="notificationsList">
        <div class="text-center text-muted py-5"><i class="bi bi-bell fs-1 d-block mb-2"></i>Loading notifications...</div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const user = checkAuth();
    if (!user) { window.location.href = 'login.html'; return; }
    displayUserInfo();

    async function loadNotifications() {
      try {
        const data = await apiRequest(API_BASE + '/notifications?limit=100');
        const list = document.getElementById('notificationsList');
        const notifs = data.notifications || [];
        if (notifs.length === 0) {
          list.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-bell-slash fs-1 d-block mb-2"></i>No notifications yet</div>';
          return;
        }
        const typeIcons = { approved: 'bi-check-circle text-success', rejected: 'bi-x-circle text-danger', modified: 'bi-arrow-repeat text-warning', resubmission_required: 'bi-arrow-repeat text-warning', hub_assigned: 'bi-building text-info', default: 'bi-info-circle text-primary' };
        list.innerHTML = notifs.map(n => {
          const icon = typeIcons[n.type] || typeIcons.default;
          const time = new Date(n.created_at).toLocaleString();
          return '<div class="notification-item d-flex align-items-start gap-3 p-3 border-bottom ' + (n.is_read ? '' : 'bg-light') + '">' +
            '<i class="bi ' + icon + ' fs-4 mt-1"></i>' +
            '<div class="flex-grow-1"><div class="fw-semibold">' + (n.title || 'Notification') + '</div>' +
            '<div class="small text-muted">' + (n.message || '') + '</div>' +
            '<div class="small text-muted mt-1">' + time + '</div></div>' +
            (n.is_read ? '' : '<button class="btn btn-sm btn-outline-green" onclick="markRead(' + n.id + ')"><i class="bi bi-check"></i></button>') +
            '</div>';
        }).join('');
      } catch (e) {
        document.getElementById('notificationsList').innerHTML = '<div class="text-center text-danger py-5"><i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i>Failed to load notifications</div>';
      }
    }

    window.markRead = async function(id) {
      try {
        await apiRequest(API_BASE + '/notifications/' + id + '/read', 'PATCH');
        loadNotifications();
      } catch (e) { showToast('Error marking notification', 'error'); }
    };

    window.markAllRead = async function() {
      try {
        await apiRequest(API_BASE + '/notifications/read-all', 'POST');
        showToast('All marked as read');
        loadNotifications();
      } catch (e) { showToast('Error marking all as read', 'error'); }
    };

    window.clearRead = async function() {
      try {
        const res = await fetch(API_BASE + '/notifications/clear-all', { method: 'POST', headers: getAuthHeaders() });
        if (res.ok) { showToast('Read notifications cleared'); loadNotifications(); }
        else throw new Error('Failed');
      } catch (e) { showToast('Error clearing notifications', 'error'); }
    };

    loadNotifications();
  </script>
</body>
</html>
