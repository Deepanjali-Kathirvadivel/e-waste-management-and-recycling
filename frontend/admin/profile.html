<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Profile - Green Era Recyclers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div class="admin-wrapper">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <!-- Dynamic rendering via main.js -->
    </aside>

    <div class="admin-main">
      <div class="admin-topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <div><h5 class="page-title">My Profile <small>Manage your administrative profile</small></h5></div>
        </div>
        <div class="admin-topbar-right">
          <div class="dropdown">
            <div class="admin-avatar dropdown-toggle" role="button" data-bs-toggle="dropdown" id="adminAvatar">SA</div>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i> My Profile</a></li>
              <li><a class="dropdown-item" href="notifications.html"><i class="bi bi-bell me-2"></i> Notifications</a></li>
              <li><a class="dropdown-item" href="../login.html"><i class="bi bi-arrow-left-right me-2"></i> Staff Portal</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="admin-content">
        <div class="profile-header-card mb-4">
          <div class="profile-cover"></div>
          <div class="profile-info">
            <div class="profile-avatar"><i class="bi bi-person-circle"></i></div>
            <div>
              <h4 class="fw-bold mb-0" id="profileName">Admin User</h4>
              <p class="text-muted mb-0" id="profileRole">Administrator</p>
            </div>
            <div class="ms-auto d-none d-md-block">
              <span class="badge bg-green px-3 py-2"><i class="bi bi-shield-check me-1"></i> Active</span>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <!-- Personal Details -->
          <div class="col-lg-12">
            <div class="admin-card">
              <div class="admin-card-body">
                <h6 class="mb-4"><i class="bi bi-pencil-square text-green me-2"></i>Personal Details</h6>
                <form id="profileForm">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <div class="form-floating">
                        <input type="text" class="form-control" id="editFullName" placeholder="Full Name">
                        <label for="editFullName">Full Name</label>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-floating">
                        <input type="email" class="form-control" id="editEmail" placeholder="Email">
                        <label for="editEmail">Email Address</label>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-floating">
                        <input type="text" class="form-control" id="editUsername" placeholder="Username" disabled>
                        <label for="editUsername">Username</label>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-floating">
                        <input type="tel" class="form-control" id="editPhone" placeholder="Phone">
                        <label for="editPhone">Phone Number</label>
                      </div>
                    </div>
                    <div class="col-12 mt-4">
                      <button type="submit" class="btn btn-primary-green"><i class="bi bi-check-lg me-1"></i> Save Changes</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>

            <!-- Change Password -->
            <div class="admin-card mt-4">
              <div class="admin-card-body">
                <h6 class="mb-4"><i class="bi bi-key text-green me-2"></i>Change Password</h6>
                <form id="changePasswordForm">
                  <div class="row g-3">
                    <div class="col-md-4">
                      <div class="form-floating">
                        <input type="password" class="form-control" id="currentPassword" placeholder="Current Password" required>
                        <label for="currentPassword">Current Password</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-floating">
                        <input type="password" class="form-control" id="newPassword" placeholder="New Password" required minlength="6">
                        <label for="newPassword">New Password</label>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-floating">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm" required minlength="6">
                        <label for="confirmPassword">Confirm Password</label>
                      </div>
                    </div>
                    <div class="col-12 mt-4">
                      <button type="submit" class="btn btn-danger-custom"><i class="bi bi-arrow-repeat me-1"></i> Update Password</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/admin-profile.js"></script>
  <script>
    window.toggleSidebar = function () { document.getElementById('adminSidebar').classList.toggle('show'); };
    window.adminLogout = function () {
      const token = localStorage.getItem('greenera_admin_token');
      if (token) {
        fetch(API_BASE + '/auth/logout', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }).catch(() => {});
      }
      localStorage.removeItem('greenera_admin_token');
      localStorage.removeItem('greenera_admin');
      sessionStorage.removeItem('greenera_admin_token');
      sessionStorage.removeItem('greenera_admin');
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>
