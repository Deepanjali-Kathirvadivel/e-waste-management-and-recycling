<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejected - Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Green Era <span class="badge bg-warning ms-2">Manager</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Manager</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="pending.html" class="nav-link"><i class="bi bi-clock me-2"></i>Pending Reviews</a>
        <a href="approved.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>Approved</a>
        <a href="rejected.html" class="nav-link active"><i class="bi bi-x-circle me-2"></i>Rejected</a>
        <a href="receipt-history.html" class="nav-link"><i class="bi bi-receipt me-2"></i>Receipts</a>
        <a href="../profile.html" class="nav-link"><i class="bi bi-person me-2"></i>My Profile</a>
      </div></nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0"><i class="bi bi-x-circle text-danger me-2"></i>Rejected Quotations</h1>
        </div>
        <div id="rejectedContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (async function() {
    const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
    if (!token) { window.location.href = '../login.html'; return; }
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const res = await fetch('/api/manager/rejected?limit=100', { headers });
      const data = await res.json();
      const list = data.quotations || [];
      let html = '<div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-light"><tr><th>ID</th><th>Customer</th><th>Product</th><th>Rejection Reason</th><th>Rejected By</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      list.forEach(q => {
        const date = q.hr_acted_at ? new Date(q.hr_acted_at).toLocaleDateString('en-IN') : '-';
        const reason = q.hr_rejection_reason || 'No reason provided';
        html += `<tr>
          <td><strong>#${q.id}</strong></td>
          <td>${q.customer_name || '-'}</td>
          <td>${q.product_catalog?.name || q.product_category || '-'}<br><small class="text-muted">${q.brand || ''} ${q.model || ''}</small></td>
          <td><span class="text-danger" title="${reason.replace(/"/g, '&quot;')}">${reason.length > 60 ? reason.substring(0,60)+'...' : reason}</span></td>
          <td>${q.approver?.full_name || '-'}</td>
          <td>${date}</td>
          <td><span class="badge bg-danger">Rejected</span></td>
          <td><a href="review.html?id=${q.id}" class="btn btn-sm btn-outline-primary-green"><i class="bi bi-eye me-1"></i>View</a></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      document.getElementById('rejectedContent').innerHTML = html || '<div class="alert alert-success mb-0"><i class="bi bi-check-circle me-2"></i>No rejected quotations.</div>';
    } catch(e) {
      document.getElementById('rejectedContent').innerHTML = '<p class="text-danger">Failed to load: ' + e.message + '</p>';
    }
  })();
  </script>
</body>
</html>
