<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Reviews - Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Green Era <span class="badge bg-warning ms-2">Manager</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Manager</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar">
        <div class="pt-4">
          <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
          <a href="pending.html" class="nav-link active"><i class="bi bi-clock me-2"></i>Pending Reviews</a>
          <a href="approved.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>Approved</a>
          <a href="rejected.html" class="nav-link"><i class="bi bi-x-circle me-2"></i>Rejected</a>
          <a href="review.html" class="nav-link"><i class="bi bi-eye me-2"></i>Review</a>
          <a href="receipt-history.html" class="nav-link"><i class="bi bi-receipt me-2"></i>Receipts</a>
          <hr>
          <a href="../dashboard.html" class="nav-link"><i class="bi bi-arrow-left me-2"></i>Back to Staff</a>
        </div>
      </nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Pending Manager Review</h1></div>
        <div id="pendingContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  const notifHeaders = { 'Authorization': 'Bearer ' + (localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token')), 'Content-Type': 'application/json' };
  async function fetchNotifCount() {
    try {
      const res = await fetch('/api/notifications/unread-count', { headers: notifHeaders });
      const data = await res.json(); const badge = document.getElementById('notifBadge');
      if (badge) { if (data.count > 0) { badge.textContent = data.count; badge.style.display = 'inline'; } else badge.style.display = 'none'; }
    } catch(e) {}
  }
  async function toggleNotifModal() {
    try {
      const res = await fetch('/api/notifications', { headers: notifHeaders });
      const data = await res.json(); const notifs = data.notifications || [];
      if (!notifs.length) { alert('No notifications'); return; }
      let msg = notifs.slice(0, 10).map((n, i) => `${i+1}. [${n.type.toUpperCase()}] ${n.title}\n  ${n.message || ''}${n.is_read ? '' : ' (NEW)'}`).join('\n\n');
      if (confirm(msg + '\n\nMark all as read?')) { await fetch('/api/notifications/read-all', { method: 'POST', headers: notifHeaders }); fetchNotifCount(); }
    } catch(e) { alert('Failed to load notifications'); }
  }
  (async function() {
    const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
    if (!token) { window.location.href = '../login.html'; return; }
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const res = await fetch('/api/manager/pending?limit=100', { headers });
      const data = await res.json();
      let html = '<table class="table table-hover"><thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Employee</th><th>Date</th><th>Action</th></tr></thead><tbody>';
      (data.quotations || []).forEach(q => {
        html += `<tr>
          <td>#${q.id}</td>
          <td>${q.customer_name || '-'}</td>
          <td>${q.product_catalog?.name || q.brand || '-'}</td>
          <td>${q.user?.full_name || '-'}</td>
          <td>${q.submitted_at ? new Date(q.submitted_at).toLocaleDateString() : '-'}</td>
          <td><a href="review.html?id=${q.id}" class="btn btn-sm btn-outline-success"><i class="bi bi-eye"></i> Review</a></td>
        </tr>`;
      });
      html += '</tbody></table>';
      if (!data.quotations?.length) html = '<div class="alert alert-success"><i class="bi bi-check-circle me-2"></i>No pending reviews</div>';
      document.getElementById('pendingContent').innerHTML = html;
      fetchNotifCount(); setInterval(fetchNotifCount, 30000);
    } catch(e) { document.getElementById('pendingContent').innerHTML = '<p class="text-danger">Failed to load</p>'; }
  })();
  </script>
</body>
</html>
