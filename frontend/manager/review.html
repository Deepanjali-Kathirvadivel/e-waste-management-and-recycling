<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Quotation - Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Green Era <span class="badge bg-warning ms-2">Manager</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Manager</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="pending.html" class="nav-link"><i class="bi bi-clock me-2"></i>Pending Reviews</a>
        <a href="approved.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>Approved</a>
        <a href="rejected.html" class="nav-link"><i class="bi bi-x-circle me-2"></i>Rejected</a>
        <a href="review.html" class="nav-link active"><i class="bi bi-eye me-2"></i>Review</a>
        <a href="receipt-history.html" class="nav-link"><i class="bi bi-receipt me-2"></i>Receipts</a>
      </div></nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Review Quotation</h1></div>
        <div id="reviewContent"><p class="text-muted">Loading quotation details...</p></div>
      </main>
    </div>
  </div>

  <!-- Approve Modal -->
  <div class="modal fade" id="approveModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title"><i class="bi bi-check-circle text-success me-2"></i>Approve Quotation</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Approved Value (₹)</label>
            <input type="number" class="form-control" id="approveValue">
          </div>
          <div class="mb-3">
            <label class="form-label">Assign Collection Hub</label>
            <select class="form-select" id="approveHub"></select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-success" onclick="approveQuotation()"><i class="bi bi-check-lg"></i> Approve</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modify Modal -->
  <div class="modal fade" id="modifyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title"><i class="bi bi-pencil text-warning me-2"></i>Modify Quotation</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-2">
            <label class="form-label">Estimated Value (₹)</label>
            <input type="number" class="form-control" id="modifyEstimate" min="0">
          </div>
          <div class="mb-2">
            <label class="form-label">Min Value (₹)</label>
            <input type="number" class="form-control" id="modifyMin" min="0">
          </div>
          <div class="mb-2">
            <label class="form-label">Max Value (₹)</label>
            <input type="number" class="form-control" id="modifyMax" min="0">
          </div>
          <div class="mb-2">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="modifyNotes" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-warning text-white" onclick="modifyQuotation()"><i class="bi bi-save"></i> Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Reject Modal -->
  <div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title"><i class="bi bi-x-circle text-danger me-2"></i>Reject Quotation</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Rejection Reason <span class="text-danger">*</span></label>
            <textarea class="form-control" id="rejectReason" rows="3" required></textarea>
            <div class="form-text">Provide a clear reason. The employee will be notified to re-negotiate.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-danger" onclick="rejectQuotation()"><i class="bi bi-x-lg"></i> Reject</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentQuotation = null;
  const notifHeaders = { 'Authorization': 'Bearer ' + (localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token')), 'Content-Type': 'application/json' };
  async function fetchNotifCount() {
    try {
      const res = await fetch('/api/notifications/unread-count', { headers: notifHeaders });
      const data = await res.json(); const badge = document.getElementById('notifBadge');
      if (badge) { if (data.count > 0) { badge.textContent = data.count; badge.style.display = 'inline'; } else badge.style.display = 'none'; }
    } catch(e) {}
  }
  async function toggleNotifModal() {
    try {
      const res = await fetch('/api/notifications', { headers: notifHeaders });
      const data = await res.json(); const notifs = data.notifications || [];
      if (!notifs.length) { alert('No notifications'); return; }
      let msg = notifs.slice(0, 10).map((n, i) => `${i+1}. [${n.type.toUpperCase()}] ${n.title}\n  ${n.message || ''}${n.is_read ? '' : ' (NEW)'}`).join('\n\n');
      if (confirm(msg + '\n\nMark all as read?')) { await fetch('/api/notifications/read-all', { method: 'POST', headers: notifHeaders }); fetchNotifCount(); }
    } catch(e) { alert('Failed to load notifications'); }
  }
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; }
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

  async function loadQuotation() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) { document.getElementById('reviewContent').innerHTML = '<div class="alert alert-warning">No quotation ID provided</div>'; return; }
    try {
      const [qRes, facRes] = await Promise.all([
        fetch('/api/manager/quotations/' + id, { headers }),
        fetch('/api/manager/facilities', { headers })
      ]);
      const qData = await qRes.json();
      const facData = await facRes.json();
      currentQuotation = qData.quotation;

      // Populate hub dropdown
      const hubSelect = document.getElementById('approveHub');
      hubSelect.innerHTML = '<option value="">Select Hub</option>' + (facData.facilities || []).map(f =>
        `<option value="${f.id}">${f.name} (${f.type})</option>`
      ).join('');

      const q = qData.quotation;
      let html = `
        <div class="card mb-4"><div class="card-header"><strong>#${q.id} - ${q.customer_name || 'Unknown'}</strong> <span class="badge bg-warning">${q.status}</span></div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">
              <h6 class="fw-bold">Customer Info</h6>
              <table class="table table-sm"><tr><td>Name</td><td>${q.customer_name || '-'}</td></tr>
              <tr><td>Phone</td><td>${q.customer_phone || '-'}</td></tr>
              <tr><td>Email</td><td>${q.customer_email || '-'}</td></tr>
              <tr><td>Address</td><td>${q.customer_address || '-'}</td></tr>
              <tr><td>District</td><td>${q.customer_district || '-'}</td></tr>
              <tr><td>State</td><td>${q.customer_state || '-'}</td></tr>
              <tr><td>Pincode</td><td>${q.customer_pincode || '-'}</td></tr></table>
            </div>
            <div class="col-md-6">
              <h6 class="fw-bold">Product Info</h6>
              <table class="table table-sm"><tr><td>Product</td><td>${q.product_catalog?.name || q.brand || '-'}</td></tr>
              <tr><td>Category</td><td>${q.product_category || '-'}</td></tr>
              <tr><td>Brand</td><td>${q.brand || '-'}</td></tr>
              <tr><td>Model</td><td>${q.model || '-'}</td></tr>
              <tr><td>Serial No</td><td>${q.serial_number || '-'}</td></tr>
              <tr><td>Condition</td><td>${q.condition || '-'}</td></tr>
              <tr><td>Weight</td><td>${q.weight_kg || '-'} kg</td></tr>
              <tr><td>Warranty</td><td>${q.warranty_status || '-'}</td></tr></table>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-md-6">
              <h6 class="fw-bold">Employee</h6>
              <p>${q.user?.full_name || '-'} (${q.user?.username || '-'})</p>
            </div>
            <div class="col-md-6">
              <h6 class="fw-bold">Valuation</h6>
              <table class="table table-sm">
                <tr><td>Estimated Value</td><td>₹${(q.value_estimate || 0).toLocaleString('en-IN')}</td></tr>
                <tr><td>Min Value</td><td>₹${(q.value_min || 0).toLocaleString('en-IN')}</td></tr>
                <tr><td>Max Value</td><td>₹${(q.value_max || 0).toLocaleString('en-IN')}</td></tr>
                <tr><td>Customer Expected</td><td>₹${(q.customer_expected_value || 0).toLocaleString('en-IN')}</td></tr>
              </table>
            </div>
          </div>
        </div></div>`;

      // Images
      if (q.assessment_images && q.assessment_images.length) {
        html += '<div class="card mb-4"><div class="card-header"><strong>Images</strong></div><div class="card-body"><div class="row">';
        q.assessment_images.forEach(img => {
          html += `<div class="col-md-3 mb-2"><img src="/uploads/assessments/${img.filename}" class="img-fluid rounded" style="max-height:150px;object-fit:cover"></div>`;
        });
        html += '</div></div></div>';
      }

      // Dynamic Questionnaire (Verification Answers)
      const detail = q.assessment_detail;
      if (detail && detail.verification_answers) {
        const va = detail.verification_answers;
        html += `<div class="card mb-4"><div class="card-header"><strong>Dynamic Questionnaire</strong></div><div class="card-body">
          <div class="row g-2 small">
            <div class="col-3"><strong>Power On:</strong> ${va.power_on || '-'}</div>
            <div class="col-3"><strong>Damage:</strong> ${va.damage || '-'}</div>
            <div class="col-3"><strong>Age:</strong> ${va.age || '-'}</div>
            <div class="col-3"><strong>Accessories:</strong> ${va.accessories || '-'}</div>
          </div>`;
        if (detail.functional_status) {
          const fs = typeof detail.functional_status === 'object' ? detail.functional_status : {};
          html += `<hr><div class="row g-2 small">${Object.entries(fs).map(([k,v]) => `<div class="col-4"><strong>${k}:</strong> ${String(v)}</div>`).join('')}</div>`;
        }
        html += `</div></div>`;
      }

      // AI Analysis
      if (q.ai_score) {
        html += `<div class="card mb-4"><div class="card-header"><strong>AI Analysis</strong></div>
        <div class="card-body">
          <div class="row g-2 small">
            <div class="col-4"><strong>Score:</strong> ${q.ai_score}</div>
            <div class="col-4"><strong>Classification:</strong> ${q.classification || 'N/A'}</div>
          </div>
        </div></div>`;
      }

      // Employee Notes
      if (q.notes) {
        html += `<div class="card mb-4"><div class="card-header"><strong>Employee Notes</strong></div>
        <div class="card-body"><p class="mb-0">${q.notes}</p></div></div>`;
      }

      // Actions
      if (q.status === 'pending_manager_review') {
        html += `<div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#approveModal"><i class="bi bi-check-circle me-2"></i>Approve</button>
          <button class="btn btn-warning btn-lg text-white" data-bs-toggle="modal" data-bs-target="#modifyModal"><i class="bi bi-pencil me-2"></i>Modify</button>
          <button class="btn btn-danger btn-lg" data-bs-toggle="modal" data-bs-target="#rejectModal"><i class="bi bi-x-circle me-2"></i>Reject</button>
        </div>`;
      }

      document.getElementById('reviewContent').innerHTML = html;
      fetchNotifCount();
    } catch(e) {
      document.getElementById('reviewContent').innerHTML = '<p class="text-danger">Failed to load: ' + e.message + '</p>';
    }
  }

  window.approveQuotation = async function() {
    const value = document.getElementById('approveValue').value || currentQuotation.customer_expected_value || currentQuotation.value_estimate;
    const hubId = document.getElementById('approveHub').value;
    try {
      const res = await fetch('/api/manager/quotations/' + currentQuotation.id + '/approve', {
        method: 'POST', headers, body: JSON.stringify({ approved_value: value })
      });
      if (!res.ok) throw new Error((await res.json()).error);
      if (hubId) {
        await fetch('/api/manager/quotations/' + currentQuotation.id + '/assign-hub', {
          method: 'POST', headers, body: JSON.stringify({ hub_id: hubId })
        });
      }
      alert('Quotation approved successfully!');
      window.location.href = 'approved.html';
    } catch(e) { alert('Error: ' + e.message); }
  };

  // Populate modify modal when opened
  document.getElementById('modifyModal').addEventListener('show.bs.modal', function () {
    if (!currentQuotation) return;
    document.getElementById('modifyEstimate').value = currentQuotation.value_estimate || '';
    document.getElementById('modifyMin').value = currentQuotation.value_min || '';
    document.getElementById('modifyMax').value = currentQuotation.value_max || '';
    document.getElementById('modifyNotes').value = currentQuotation.notes || '';
  });

  window.modifyQuotation = async function() {
    const body = {};
    const est = document.getElementById('modifyEstimate').value;
    const min = document.getElementById('modifyMin').value;
    const max = document.getElementById('modifyMax').value;
    const notes = document.getElementById('modifyNotes').value.trim();
    if (est) body.value_estimate = parseFloat(est);
    if (min) body.value_min = parseFloat(min);
    if (max) body.value_max = parseFloat(max);
    if (notes) body.notes = notes;
    if (!Object.keys(body).length) { alert('No changes to save'); return; }
    try {
      const res = await fetch('/api/manager/quotations/' + currentQuotation.id + '/modify', {
        method: 'POST', headers, body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error((await res.json()).error);
      bootstrap.Modal.getInstance(document.getElementById('modifyModal')).hide();
      alert('Quotation modified successfully');
      loadQuotation();
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.rejectQuotation = async function() {
    const reason = document.getElementById('rejectReason').value.trim();
    if (!reason) { alert('Please provide a rejection reason'); return; }
    try {
      const res = await fetch('/api/manager/quotations/' + currentQuotation.id + '/reject', {
        method: 'POST', headers, body: JSON.stringify({ reason })
      });
      if (!res.ok) throw new Error((await res.json()).error);
      alert('Quotation rejected');
      window.location.href = 'rejected.html';
    } catch(e) { alert('Error: ' + e.message); }
  };

  loadQuotation();
  </script>
</body>
</html>
