<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-building"></i> Green Era <span class="badge bg-warning ms-2">Hub</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="receiving.html" class="nav-link"><i class="bi bi-inbox me-2"></i>Pending Receiving</a>
        <a href="inventory.html" class="nav-link active"><i class="bi bi-boxes me-2"></i>Inventory</a>
      </div>
      <hr>
      <div class="px-3"><small class="text-muted">Notifications</small><div id="hubNotifBadge" class="mt-1"></div></div>
    </nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Hub Inventory</h1></div>
        <div class="row g-3 mb-3" id="summaryCards"></div>
        <div id="inventoryContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>
  <!-- History Modal -->
  <div class="modal fade" id="historyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Product Movement History</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="historyContent">Loading...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentPage = 1, totalPages = 1;
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; }
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

  async function loadInventory(page) {
    try {
      const res = await fetch('/api/hub/inventory?page=' + (page || currentPage) + '&limit=15', { headers });
      const data = await res.json();
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;

      if (data.summary) {
        const colors = { reusable: 'success', repairable: 'info', recyclable: 'warning', scrap: 'danger' };
        let summaryHtml = '';
        data.summary.forEach(s => {
          summaryHtml += '<div class="col-md-3"><div class="card border-' + (colors[s.classification] || 'secondary') + ' bg-opacity-10"><div class="card-body text-center"><h3 class="fw-bold text-' + (colors[s.classification] || 'secondary') + '">' + s.count + '</h3><small>' + s.classification + '</small></div></div></div>';
        });
        document.getElementById('summaryCards').innerHTML = summaryHtml;
      }

      let html = '<table class="table table-hover"><thead><tr><th>ID</th><th>Product</th><th>Classification</th><th>Status</th><th>History</th><th>Actions</th></tr></thead><tbody>';
      (data.items || []).forEach(item => {
        const movementCount = item.movement_history ? (typeof item.movement_history === 'string' ? JSON.parse(item.movement_history).length : item.movement_history.length) : 0;
        const classColor = item.classification === 'reusable' ? 'success' : item.classification === 'repairable' ? 'info' : item.classification === 'recyclable' ? 'warning' : 'danger';
        html += '<tr>\
          <td>#' + item.id + '</td>\
          <td>' + (item.product_catalog?.name || item.brand || '-') + '</td>\
          <td><span class="badge bg-' + classColor + '">' + (item.classification || 'N/A') + '</span></td>\
          <td>' + (item.status || '').replace(/_/g, ' ') + '</td>\
          <td><button class="btn btn-sm btn-outline-secondary" onclick="showHistory(' + item.id + ')"><i class="bi bi-clock-history"></i> ' + movementCount + '</button></td>\
          <td>\
            ' + (item.status === 'received' ? '<button class="btn btn-sm btn-outline-primary" onclick="forwardAnalysis(' + item.id + ')"><i class="bi bi-send"></i> Analyze</button>' : '') + '\
            ' + (item.status === 'reusability_analysis' ? '<button class="btn btn-sm btn-outline-success" onclick="completeAnalysis(' + item.id + ')"><i class="bi bi-check-lg"></i> Complete</button>' : '') + '\
          </td>\
        </tr>';
      });
      html += '</tbody></table>';
      if (totalPages > 1) {
        html += '<nav><ul class="pagination pagination-sm justify-content-center mt-3">';
        html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadInventory(' + (currentPage - 1) + ');return false">Previous</a></li>';
        html += '<li class="page-item disabled"><span class="page-link">Page ' + currentPage + ' of ' + totalPages + '</span></li>';
        html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadInventory(' + (currentPage + 1) + ');return false">Next</a></li>';
        html += '</ul></nav>';
      }
      if (!data.items?.length) html = '<div class="alert alert-info">No items in inventory</div>';
      document.getElementById('inventoryContent').innerHTML = html;
    } catch(e) { document.getElementById('inventoryContent').innerHTML = '<p class="text-danger">Failed to load</p>'; }
  }

  window.showHistory = async function(id) {
    try {
      const res = await fetch('/api/supply-chain/deals/' + id, { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error((await res.json()).error);
      const data = await res.json();
      const deal = data.deal || data;
      const history = typeof deal.movement_history === 'string' ? JSON.parse(deal.movement_history) : (deal.movement_history || []);
      let html = '<div class="list-group">';
      if (history.length === 0) {
        html += '<div class="list-group-item text-muted">No movement history recorded</div>';
      } else {
        history.forEach(h => {
          const time = h.assigned_at || h.collected_at || h.verified_at || h.received_at || h.forwarded_at || h.completed_at || h.updated_at || '';
          html += '<div class="list-group-item"><strong>' + (h.action || '').replace(/_/g, ' ') + '</strong><br><small class="text-muted">' + (time ? new Date(time).toLocaleString() : '') + '</small></div>';
        });
      }
      html += '</div>';
      document.getElementById('historyContent').innerHTML = html;
      new bootstrap.Modal(document.getElementById('historyModal')).show();
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.forwardAnalysis = async function(id) {
    if (!confirm('Forward this product for reusability analysis?')) return;
    try {
      const res = await fetch('/api/hub/' + id + '/forward-analysis', { method: 'POST', headers });
      if (!res.ok) throw new Error((await res.json()).error);
      showToast('Forwarded for analysis!');
      loadInventory(currentPage);
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.completeAnalysis = async function(id) {
    const classification = prompt('Enter classification (reusable/repairable/recyclable/scrap):');
    if (!classification || !['reusable', 'repairable', 'recyclable', 'scrap'].includes(classification)) {
      alert('Invalid classification');
      return;
    }
    try {
      const res = await fetch('/api/hub/' + id + '/complete-analysis', { method: 'POST', headers, body: JSON.stringify({ classification }) });
      if (!res.ok) throw new Error((await res.json()).error);
      showToast('Analysis completed!');
      loadInventory(currentPage);
    } catch(e) { alert('Error: ' + e.message); }
  };

  async function loadNotifBadge() {
    try {
      const r = await fetch('/api/notifications/unread-count', { headers: { 'Authorization': 'Bearer ' + token } });
      const d = await r.json();
      document.getElementById('hubNotifBadge').innerHTML = '<span class="badge bg-danger">' + (d.count || 0) + ' new</span>';
    } catch(e) { /* ignore */ }
  }

  loadInventory(1);
  loadNotifBadge();
  </script>
</body>
</html>
