<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiving - Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-building"></i> Green Era <span class="badge bg-info ms-2">Hub</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="receiving.html" class="nav-link active"><i class="bi bi-inbox me-2"></i>Receiving</a>
        <a href="inventory.html" class="nav-link"><i class="bi bi-boxes me-2"></i>Inventory</a>
        <hr>
        <div class="px-3"><a href="../dashboard.html" class="nav-link"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
      </div></nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0"><i class="bi bi-inbox me-2"></i>Pending Receiving</h1>
          <button class="btn btn-sm btn-outline-primary-green" onclick="loadReceiving(currentPage)"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div id="receivingContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>

  <!-- Analysis Modal -->
  <div class="modal fade" id="analysisModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="bi bi-clipboard-data me-2"></i>Reusability Analysis</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="analysisModalBody">Loading...</div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentPage = 1, totalPages = 1, analysisDealId = null;
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; }
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

  async function loadReceiving(page) {
    try {
      const res = await fetch('/api/hub/pending?page='+(page||1)+'&limit=20', { headers });
      const data = await res.json();
      currentPage = data.page || 1; totalPages = data.total_pages || 1;
      let html = '<div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-light"><tr><th>Deal #</th><th>Product</th><th>Delivered By</th><th>Customer</th><th>Weight</th><th>Actions</th></tr></thead><tbody>';
      (data.items || []).forEach(item => {
        const inv = item.inventory_item || {};
        html += `<tr>
          <td><strong>${item.deal_number||'#'+item.id}</strong></td>
          <td>${item.product_catalog?.name||item.brand||'-'}<br><small class="text-muted">${item.brand||''} ${item.model||''}</small></td>
          <td>${item.supply_chain_user?.full_name||'-'}</td>
          <td>${item.customer_name||'-'}</td>
          <td>${item.weight_kg||'-'} kg</td>
          <td style="min-width:200px">
            ${!inv.id ? `<button class="btn btn-sm btn-success mb-1" onclick="receiveItem(${item.id})"><i class="bi bi-check-lg me-1"></i>Receive</button>` : `<span class="badge bg-primary me-1">Inventory #${inv.id}</span>`}
            ${item.status === 'delivered_to_hub' && inv.id ? `<button class="btn btn-sm btn-info mb-1" onclick="forwardAnalysis(${item.id})"><i class="bi bi-send me-1"></i>Forward Analysis</button>` : ''}
            ${item.status === 'reusability_analysis' ? `<button class="btn btn-sm btn-warning mb-1" onclick="openAnalysis(${item.id})"><i class="bi bi-clipboard-data me-1"></i>Analyse</button>` : ''}
            ${inv.id ? `<button class="btn btn-sm btn-outline-secondary mb-1" onclick="viewDeal(${item.id})"><i class="bi bi-eye"></i></button>` : ''}
          </td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      if (totalPages > 1) {
        html += `<nav><ul class="pagination pagination-sm justify-content-center"><li class="page-item ${currentPage<=1?'disabled':''}"><a class="page-link" href="#" onclick="loadReceiving(${currentPage-1});return false">Prev</a></li>
          <li class="page-item disabled"><span class="page-link">${currentPage}/${totalPages}</span></li>
          <li class="page-item ${currentPage>=totalPages?'disabled':''}"><a class="page-link" href="#" onclick="loadReceiving(${currentPage+1});return false">Next</a></li></ul></nav>`;
      }
      document.getElementById('receivingContent').innerHTML = html || '<div class="alert alert-success">No pending items to receive</div>';
    } catch(e) { document.getElementById('receivingContent').innerHTML = '<p class="text-danger">Failed: '+e.message+'</p>'; }
  }

  window.receiveItem = async function(id) {
    if (!confirm('Receive this product into hub inventory?')) return;
    try {
      const r = await fetch('/api/hub/'+id+'/receive', { method:'POST', headers });
      if (!r.ok) throw new Error((await r.json()).error);
      showToast('Product received! Inventory record created.');
      loadReceiving(currentPage);
    } catch(e) { showToast(e.message, 'error'); }
  };

  window.forwardAnalysis = async function(id) {
    if (!confirm('Forward this product for reusability analysis?')) return;
    try {
      const r = await fetch('/api/hub/'+id+'/forward-analysis', { method:'POST', headers });
      if (!r.ok) throw new Error((await r.json()).error);
      showToast('Forwarded for analysis');
      loadReceiving(currentPage);
    } catch(e) { showToast(e.message, 'error'); }
  };

  window.openAnalysis = function(id) {
    analysisDealId = id;
    const body = document.getElementById('analysisModalBody');
    body.innerHTML = `
      <div class="mb-3"><label class="form-label fw-bold">Classification</label>
        <select class="form-select" id="analysisClassification">
          <option value="">Select...</option>
          <option value="reusable">Reusable</option>
          <option value="repairable">Repairable</option>
          <option value="recyclable">Recyclable</option>
          <option value="scrap">Scrap</option>
        </select></div>
      <div class="mb-3"><label class="form-label fw-bold">Condition Assessment</label>
        <textarea class="form-control" id="analysisCondition" rows="2" placeholder="Describe overall condition, visible damage, working status..."></textarea></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label small">Repairable Components (comma separated)</label>
          <input class="form-control" id="analysisRepairable" placeholder="e.g. battery, screen, motor"></div>
        <div class="col-6"><label class="form-label small">Recoverable Materials (comma separated)</label>
          <input class="form-control" id="analysisRecoverable" placeholder="e.g. copper, plastic, glass"></div></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label small">Hazardous Materials (comma separated)</label>
          <input class="form-control" id="analysisHazardous" placeholder="e.g. battery, mercury"></div>
        <div class="col-6"><label class="form-label small">Weight Breakdown (JSON)</label>
          <input class="form-control" id="analysisWeight" placeholder='{"metal":"2kg","plastic":"1kg"}'></div></div>
      <div class="mb-3"><label class="form-label fw-bold">Notes</label>
        <textarea class="form-control" id="analysisNotes" rows="2"></textarea></div>
      <div class="alert alert-info small py-2" id="analysisCalc">
        <strong>Auto-calculated:</strong> Recovery Potential, Estimated Revenue, and Material Recovery % will be computed based on classification.
      </div>
      <button class="btn btn-primary-green w-100" onclick="submitAnalysis()"><i class="bi bi-check-lg me-1"></i>Complete Analysis</button>`;
    new bootstrap.Modal(document.getElementById('analysisModal')).show();
  };

  window.submitAnalysis = async function() {
    const classification = document.getElementById('analysisClassification').value;
    if (!classification) { showToast('Select a classification', 'error'); return; }
    const condition_assessment = document.getElementById('analysisCondition').value.trim();
    const repairable_components = document.getElementById('analysisRepairable').value ? document.getElementById('analysisRepairable').value.split(',').map(s=>s.trim()) : [];
    const recoverable_materials = document.getElementById('analysisRecoverable').value ? document.getElementById('analysisRecoverable').value.split(',').map(s=>s.trim()) : [];
    const hazardous_materials = document.getElementById('analysisHazardous').value ? document.getElementById('analysisHazardous').value.split(',').map(s=>s.trim()) : [];
    let weight_breakdown = null;
    try { const w = document.getElementById('analysisWeight').value; if (w) weight_breakdown = JSON.parse(w); } catch(e) { showToast('Invalid weight JSON', 'error'); return; }
    const notes = document.getElementById('analysisNotes').value.trim();

    try {
      const r = await fetch('/api/hub/'+analysisDealId+'/complete-analysis', { method:'POST', headers, body: JSON.stringify({ classification, condition_assessment: condition_assessment||null, repairable_components: repairable_components.length?repairable_components:null, recoverable_materials: recoverable_materials.length?recoverable_materials:null, hazardous_materials: hazardous_materials.length?hazardous_materials:null, weight_breakdown, notes: notes||null }) });
      if (!r.ok) throw new Error((await r.json()).error);
      bootstrap.Modal.getInstance(document.getElementById('analysisModal')).hide();
      showToast('Analysis completed! Classification: '+classification);
      loadReceiving(currentPage);
    } catch(e) { showToast(e.message, 'error'); }
  };

  window.viewDeal = async function(id) {
    try {
      const r = await fetch('/api/supply-chain/deals/'+id, { headers });
      const data = await r.json();
      const d = data.deal || data;
      const inv = d.inventory_item || {};
      const analysis = d.analysis_result || {};
      alert(`Deal #${d.id}\nProduct: ${d.product_catalog?.name||d.brand||'-'}\nCustomer: ${d.customer_name||'-'}\nInventory Batch: ${inv.batch_number||'-'}\nLocation: ${inv.storage_location||'Not set'}\nAnalysis: ${analysis.classification||'Pending'}`);
    } catch(e) { showToast(e.message, 'error'); }
  };

  loadReceiving(1);
  </script>
</body>
</html>
