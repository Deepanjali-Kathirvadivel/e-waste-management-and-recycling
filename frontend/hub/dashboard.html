<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Dashboard - Green Era</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#"><i class="bi bi-building"></i> Green Era <span class="badge bg-warning ms-2">Hub</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="receiving.html" class="nav-link"><i class="bi bi-inbox me-2"></i>Pending Receiving</a>
        <a href="inventory.html" class="nav-link"><i class="bi bi-boxes me-2"></i>Inventory</a>
      </div>
      <hr>
      <div class="px-3"><small class="text-muted">Notifications</small><div id="hubNotifBadge" class="mt-1"></div></div>
      <hr>
      <div class="px-3"><a href="../dashboard.html" class="nav-link"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
    </nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Hub Operations Dashboard</h1></div>
        <div class="row g-3 mb-4" id="kpiCards">
          <div class="col-md-3"><div class="card bg-warning bg-opacity-10 border-warning"><div class="card-body text-center"><h3 class="fw-bold text-warning" id="kpiPending">0</h3><small>Pending Receiving</small></div></div></div>
          <div class="col-md-3"><div class="card bg-info bg-opacity-10 border-info"><div class="card-body text-center"><h3 class="fw-bold text-info" id="kpiInventory">0</h3><small>Total Inventory</small></div></div></div>
          <div class="col-md-3"><div class="card bg-success bg-opacity-10 border-success"><div class="card-body text-center"><h3 class="fw-bold text-success" id="kpiReceived">0</h3><small>Received Today</small></div></div></div>
          <div class="col-md-3"><div class="card bg-primary bg-opacity-10 border-primary"><div class="card-body text-center"><h3 class="fw-bold text-primary" id="kpiAnalysis">0</h3><small>Forwarded for Analysis</small></div></div></div>
        </div>
        <div class="card"><div class="card-header"><h6 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2"></i>Recent Deliveries</h6></div>
        <div class="card-body" id="recentDeliveries"><p class="text-muted">Loading...</p></div></div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (async function() {
    const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
    if (!token) { window.location.href = '../login.html'; return; }
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const res = await fetch('/api/hub/dashboard', { headers });
      const data = await res.json();
      document.getElementById('kpiPending').textContent = data.pending_receiving || 0;
      document.getElementById('kpiInventory').textContent = data.total_inventory || 0;
      document.getElementById('kpiReceived').textContent = data.received_today || 0;
      document.getElementById('kpiAnalysis').textContent = data.forwarded_for_analysis || 0;

      let html = '<table class="table table-sm"><thead><tr><th>ID</th><th>Product</th><th>Employee</th><th>Status</th></tr></thead><tbody>';
      (data.recent_deliveries || []).forEach(d => {
        html += `<tr><td>#${d.id}</td><td>${d.product_catalog?.name || d.brand || '-'}</td><td>${d.user?.full_name || '-'}</td><td><span class="badge bg-info">${d.status}</span></td></tr>`;
      });
      html += '</tbody></table>';
      if (!data.recent_deliveries?.length) html = '<p class="text-muted">No recent deliveries</p>';
      document.getElementById('recentDeliveries').innerHTML = html;
      async function loadNotifBadge() {
        try {
          const r = await fetch('/api/notifications/unread-count', { headers: { 'Authorization': 'Bearer ' + token } });
          const d = await r.json();
          document.getElementById('hubNotifBadge').innerHTML = '<span class="badge bg-danger">' + (d.count || 0) + ' new</span>';
        } catch(e) { /* ignore */ }
      }
      loadNotifBadge();
    } catch(e) { document.getElementById('recentDeliveries').innerHTML = '<p class="text-danger">Failed to load</p>'; }
  })();
  </script>
</body>
</html>
