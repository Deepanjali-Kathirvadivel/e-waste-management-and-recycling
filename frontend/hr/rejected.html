<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejected Quotations - Green Era Recyclers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Green Era Recyclers <span class="badge bg-warning ms-2">HR Portal</span></a>
      <div class="d-flex align-items-center gap-3">
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">HR</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4">
    <div class="row">
      <div class="col-lg-2 col-md-3 mb-4">
        <div class="list-group shadow-sm rounded-3 overflow-hidden">
          <a href="dashboard.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3"><i class="bi bi-speedometer2 text-green"></i> Dashboard</a>
          <a href="pending.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3"><i class="bi bi-clock text-warning"></i> Pending Quotations</a>
          <a href="approved.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3"><i class="bi bi-check-circle text-success"></i> Approved Quotations</a>
          <a href="rejected.html" class="list-group-item list-group-item-action active bg-green border-green d-flex align-items-center gap-3"><i class="bi bi-x-circle"></i> Rejected Quotations</a>
          <a href="receipt-history.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3"><i class="bi bi-receipt text-green"></i> Receipt History</a>
          <a href="../profile.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3"><i class="bi bi-person text-green"></i> My Profile</a>
        </div>
      </div>
      <div class="col-lg-10 col-md-9">
        <h4 class="fw-bold mb-4"><i class="bi bi-x-circle text-danger me-2"></i>Rejected Quotations</h4>
        <div class="table-custom">
          <div class="table-responsive">
            <table class="table mb-0">
              <thead>
                <tr><th>#ID</th><th>Date</th><th>Customer</th><th>Product</th><th>Reason</th><th>Rejected By</th><th>Action</th></tr>
              </thead>
              <tbody id="rejectedTableBody">
                <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <nav class="mt-3 d-flex justify-content-between align-items-center">
          <small class="text-muted" id="tableInfo"></small>
          <ul class="pagination pagination-sm mb-0" id="tablePagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/hr-quotations.js"></script>
  <script>renderRejectedQuotations();</script>
