<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approved Deals - Supply Chain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-truck"></i> Green Era <span class="badge bg-warning ms-2">Supply Chain</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="deals.html" class="nav-link active"><i class="bi bi-check2-all me-2"></i>Approved Deals</a>
        <a href="deliveries.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>Deliveries</a>
      </div>
      <hr>
      <div class="px-3"><small class="text-muted">Notifications</small><div id="scNotifBadge" class="mt-1"></div></div>
    </nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Approved Deals</h1></div>
        <div id="dealsContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>

  <!-- OTP Modal -->
  <div class="modal fade" id="otpModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">OTP Verification</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <p>Enter the 6-digit OTP sent to the customer's phone.</p>
          <input type="text" class="form-control form-control-lg text-center" id="otpInput" maxlength="6" placeholder="000000">
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="verifyOTP()"><i class="bi bi-shield-check"></i> Verify OTP</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Customer Details Modal -->
  <div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Customer Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="customerDetailsBody">Loading...</div>
      </div>
    </div>
  </div>

  <!-- QR Code Modal -->
  <div class="modal fade" id="qrModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Product QR Code</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body text-center">
          <div id="qrCodeDisplay"></div>
          <p class="text-muted mt-2 small">Scan at hub to receive this item</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentDealId = null, currentPage = 1, totalPages = 1;
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; }
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

  async function loadDeals(page) {
    try {
      const res = await fetch('/api/supply-chain/deals?page=' + (page || currentPage) + '&limit=15', { headers });
      const data = await res.json();
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;
      let html = '<table class="table table-hover"><thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Approved Amt</th><th>Status</th><th>Hub</th><th>Actions</th></tr></thead><tbody>';
      (data.deals || []).forEach(d => {
        const statusBadge = { hub_assigned: 'warning', supply_chain_assigned: 'info', otp_verified: 'success', payment_completed: 'primary', collected: 'secondary', in_transit: 'dark' }[d.status] || 'secondary';
        const hasReceipt = d.status === 'payment_completed' || d.status === 'collected' || d.status === 'in_transit' || d.status === 'delivered_to_hub';
        const custInfo = encodeURIComponent(JSON.stringify({ name: d.customer_name, phone: d.customer_phone, email: d.customer_email, address: d.customer_address, state: d.customer_state, district: d.customer_district, pincode: d.customer_pincode }));
        html += `<tr>
          <td>#${d.id}</td>
          <td><a href="#" onclick="showCustomer('${custInfo}');return false" class="text-decoration-none">${d.customer_name || '-'}</a></td>
          <td>${d.product_catalog?.name || d.brand || '-'}</td>
          <td>\u20B9${(d.hr_approved_value || d.value_estimate || 0).toLocaleString('en-IN')}</td>
          <td><span class="badge bg-${statusBadge}">${d.status.replace(/_/g, ' ')}</span></td>
          <td>${d.assigned_hub?.name || '-'}</td>
          <td>
            ${d.status === 'hub_assigned' && !d.supply_chain_user_id ? `<button class="btn btn-sm btn-outline-info" onclick="assignSelf(${d.id})"><i class="bi bi-hand-index"></i> Take</button>` : ''}
            ${['hub_assigned', 'supply_chain_assigned'].includes(d.status) && d.supply_chain_user_id ? `<button class="btn btn-sm btn-outline-warning" onclick="generateOTP(${d.id})"><i class="bi bi-shield-lock"></i> OTP</button>` : ''}
            ${d.status === 'otp_verified' ? `<button class="btn btn-sm btn-outline-success" onclick="collectProduct(${d.id})"><i class="bi bi-check-lg"></i> Collect</button>` : ''}
            ${['payment_completed', 'collected'].includes(d.status) ? `<button class="btn btn-sm btn-outline-dark" onclick="updateStatus(${d.id}, '${d.status === 'payment_completed' ? 'collected' : 'in_transit'}')"><i class="bi bi-truck"></i> Transport</button>` : ''}
            ${d.status === 'in_transit' ? `<button class="btn btn-sm btn-outline-primary" onclick="updateStatus(${d.id}, 'delivered_to_hub')"><i class="bi bi-building"></i> Delivered</button>` : ''}
            ${hasReceipt ? `<button class="btn btn-sm btn-outline-success" onclick="downloadReceipt(${d.id})"><i class="bi bi-file-pdf"></i></button>` : ''}
            ${hasReceipt ? `<button class="btn btn-sm btn-outline-info" onclick="showQR(${d.id})"><i class="bi bi-qr-code"></i></button>` : ''}
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
      html += paginationHtml(currentPage, totalPages, 'loadDeals');
      if (!data.deals?.length) html = '<div class="alert alert-info">No deals available</div>';
      document.getElementById('dealsContent').innerHTML = html;
    } catch(e) { document.getElementById('dealsContent').innerHTML = '<p class="text-danger">Failed to load</p>'; }
  }

  function paginationHtml(page, total, fn) {
    if (total <= 1) return '';
    return `<nav><ul class="pagination pagination-sm justify-content-center mt-3">
      <li class="page-item ${page <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="${fn}(${page - 1});return false">Previous</a></li>
      <li class="page-item disabled"><span class="page-link">Page ${page} of ${total}</span></li>
      <li class="page-item ${page >= total ? 'disabled' : ''}"><a class="page-link" href="#" onclick="${fn}(${page + 1});return false">Next</a></li>
    </ul></nav>`;
  }

  window.showCustomer = function(encoded) {
    const c = JSON.parse(decodeURIComponent(encoded));
    document.getElementById('customerDetailsBody').innerHTML = `
      <table class="table table-sm">
        <tr><th>Name</th><td>${c.name || '-'}</td></tr>
        <tr><th>Phone</th><td>${c.phone || '-'}</td></tr>
        <tr><th>Email</th><td>${c.email || '-'}</td></tr>
        <tr><th>Address</th><td>${c.address || '-'}</td></tr>
        <tr><th>State</th><td>${c.state || '-'}</td></tr>
        <tr><th>District</th><td>${c.district || '-'}</td></tr>
        <tr><th>Pincode</th><td>${c.pincode || '-'}</td></tr>
      </table>`;
    new bootstrap.Modal(document.getElementById('customerModal')).show();
  };

  window.assignSelf = async function(id) {
    if (!confirm('Assign this deal to yourself?')) return;
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/assign', { method: 'POST', headers });
      if (!res.ok) throw new Error((await res.json()).error);
      showToast('Deal assigned!');
      loadDeals(currentPage);
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.generateOTP = async function(id) {
    currentDealId = id;
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/generate-otp', { method: 'POST', headers });
      if (!res.ok) throw new Error((await res.json()).error);
      document.getElementById('otpInput').value = '';
      new bootstrap.Modal(document.getElementById('otpModal')).show();
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.verifyOTP = async function() {
    const otp = document.getElementById('otpInput').value.trim();
    if (!otp || otp.length < 6) { alert('Enter valid OTP'); return; }
    try {
      const res = await fetch('/api/supply-chain/deals/' + currentDealId + '/verify-otp', { method: 'POST', headers, body: JSON.stringify({ otp }) });
      if (!res.ok) throw new Error((await res.json()).error);
      bootstrap.Modal.getInstance(document.getElementById('otpModal')).hide();
      showToast('OTP Verified!');
      loadDeals(currentPage);
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.collectProduct = async function(id) {
    if (!confirm('Mark this product as collected and payment completed?')) return;
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/collect', { method: 'POST', headers });
      if (!res.ok) throw new Error((await res.json()).error);
      showToast('Product collected! Receipt generated.');
      loadDeals(currentPage);
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.updateStatus = async function(id, status) {
    if (!confirm('Update status to "' + status + '"?')) return;
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/transport-status', { method: 'PATCH', headers, body: JSON.stringify({ status }) });
      if (!res.ok) throw new Error((await res.json()).error);
      showToast('Status updated!');
      loadDeals(currentPage);
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.downloadReceipt = async function(id) {
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/receipt', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error((await res.json()).error);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'receipt-' + id + '.pdf';
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Error downloading receipt: ' + e.message); }
  };

  window.showQR = async function(id) {
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/receipt', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error((await res.json()).error);
      const blob = await res.blob();
      const qrContainer = document.getElementById('qrCodeDisplay');
      qrContainer.innerHTML = '';
      const qrData = JSON.stringify({ id: id, deal: 'DEAL-' + String(id).padStart(6, '0'), receipt: 'RCPT-' + String(id).padStart(6, '0') });
      if (typeof QRCode !== 'undefined') {
        new QRCode(qrContainer, { text: qrData, width: 180, height: 180 });
      } else {
        qrContainer.innerHTML = '<p class="text-muted">QR library not loaded</p>';
      }
      new bootstrap.Modal(document.getElementById('qrModal')).show();
    } catch(e) { alert('Error: ' + e.message); }
  };

  async function loadNotifBadge() {
    try {
      const r = await fetch('/api/notifications/unread-count', { headers: { 'Authorization': 'Bearer ' + token } });
      const d = await r.json();
      document.getElementById('scNotifBadge').innerHTML = `<span class="badge bg-danger">${d.count || 0} new</span>`;
    } catch(e) { /* ignore */ }
  }

  loadDeals(1);
  loadNotifBadge();
  </script>
</body>
</html>
