<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Supply Chain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#"><i class="bi bi-truck"></i> Green Era <span class="badge bg-warning ms-2">Supply Chain</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <a class="text-dark text-decoration-none position-relative" href="notifications.html" id="notifBellSC" title="Notifications">
          <i class="bi bi-bell fs-5 text-green"></i>
          <span id="scNotifCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;font-size:9px">0</span>
        </a>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../profile.html"><i class="bi bi-person me-2"></i>My Profile</a></li>
            <li><a class="dropdown-item" href="notifications.html"><i class="bi bi-bell me-2"></i>Notifications</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="approved-deals.html" class="nav-link"><i class="bi bi-check2-all me-2"></i>Approved Deals</a>
        <a href="closed-deals.html" class="nav-link"><i class="bi bi-hand-thumbs-up me-2"></i>Closed Deals</a>
        <a href="history.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>History</a>
        <hr>
      </div></nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4 mb-0"><i class="bi bi-speedometer2 me-2"></i>Supply Chain Dashboard</h1></div>

        <!-- KPI Cards -->
        <div class="row g-2 mb-4">
          <div class="col-md-2 col-6"><div class="card border-0 shadow-sm bg-info bg-opacity-10"><div class="card-body text-center py-3"><div class="fs-3 text-info fw-bold" id="kpiApprovedDeals">0</div><small class="text-muted">Approved Deals</small></div></div></div>
          <div class="col-md-2 col-6"><div class="card border-0 shadow-sm bg-warning bg-opacity-10"><div class="card-body text-center py-3"><div class="fs-3 text-warning fw-bold" id="kpiClosedDeals">0</div><small class="text-muted">Closed Deals</small></div></div></div>
          <div class="col-md-2 col-6"><div class="card border-0 shadow-sm bg-success bg-opacity-10"><div class="card-body text-center py-3"><div class="fs-3 text-success fw-bold" id="kpiHistoryDeals">0</div><small class="text-muted">History</small></div></div></div>
          <div class="col-md-3 col-6"><div class="card border-0 shadow-sm bg-dark bg-opacity-10"><div class="card-body text-center py-3"><div class="fs-3 text-dark fw-bold" id="kpiTodayPickups">0</div><small class="text-muted">Today's Pickups</small></div></div></div>
          <div class="col-md-3 col-6"><div class="card border-0 shadow-sm bg-primary bg-opacity-10"><div class="card-body text-center py-3"><div class="fs-3 text-primary fw-bold" id="kpiPendingPickups">0</div><small class="text-muted">Pending Pickups</small></div></div></div>
        </div>

        <!-- Charts Row -->
        <div class="row g-2 mb-4">
          <div class="col-md-6"><div class="card shadow-sm"><div class="card-header bg-white fw-bold small">Daily Pickup Trend <span class="text-muted fw-normal">(30 days)</span></div><div class="card-body"><canvas id="trendChart" height="180"></canvas></div></div></div>
          <div class="col-md-3"><div class="card shadow-sm"><div class="card-header bg-white fw-bold small">Category Distribution</div><div class="card-body"><canvas id="categoryChart" height="180"></canvas></div></div></div>
          <div class="col-md-3"><div class="card shadow-sm"><div class="card-header bg-white fw-bold small">Branch Pickups</div><div class="card-body"><canvas id="branchChart" height="180"></canvas></div></div></div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (async function() {
    const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
    if (!token) { window.location.href = '../login.html'; return; }
    const h = { 'Authorization': 'Bearer ' + token };
    const user = JSON.parse(localStorage.getItem('greenera_user') || '{}');
    document.getElementById('userName').textContent = user.full_name || user.username || 'Staff';
    document.getElementById('dashboardDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
    try {
      const res = await fetch(API_BASE + '/supply-chain/dashboard', { headers: h });
      const dash = await res.json();
      document.getElementById('kpiApprovedDeals').textContent = dash.approved_deals || 0;
      document.getElementById('kpiClosedDeals').textContent = dash.closed_deals || 0;
      document.getElementById('kpiHistoryDeals').textContent = dash.history_deals || 0;
      document.getElementById('kpiTodayPickups').textContent = dash.today_pickups || 0;
      document.getElementById('kpiPendingPickups').textContent = dash.pending_pickups || 0;

      const trendLabels = dash.daily_trend?.map(t => t.date) || [];
      const trendData = dash.daily_trend?.map(t => t.count) || [];
      new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: { labels: trendLabels.length ? trendLabels : ['No Data'], datasets: [{ label: 'Pickups', data: trendData.length ? trendData : [0], borderColor: '#0D6EFD', backgroundColor: 'rgba(13,110,253,0.08)', fill: true, tension: 0.3 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
      });

      const catLabels = dash.category_distribution?.map(c => c.category) || [];
      const catData = dash.category_distribution?.map(c => c.count) || [];
      const catColors = ['#0D6EFD','#198754','#FFC107','#DC3545','#6F42C1','#20C997','#FD7E14'];
      new Chart(document.getElementById('categoryChart'), {
        type: 'doughnut',
        data: { labels: catLabels.length ? catLabels : ['No Data'], datasets: [{ data: catData.length ? catData : [1], backgroundColor: catColors.slice(0, catLabels.length || 1) }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 10 } } } } }
      });

      const branchLabels = dash.branch_pickups?.map(b => b.branch) || [];
      const branchData = dash.branch_pickups?.map(b => b.count) || [];
      new Chart(document.getElementById('branchChart'), {
        type: 'bar',
        data: { labels: branchLabels.length ? branchLabels : ['No Data'], datasets: [{ label: 'Pickups', data: branchData.length ? branchData : [0], backgroundColor: '#198754' }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
      });

      // Notifications
      try { const nr = await fetch(API_BASE + '/notifications/unread-count', { headers: h }); const nd = await nr.json(); const b = document.getElementById('scNotifCount'); if (nd.count > 0) { b.textContent = nd.count; b.style.display = ''; } } catch(e) {}
    } catch(e) {}
  })();
  </script>
</body>
</html>
