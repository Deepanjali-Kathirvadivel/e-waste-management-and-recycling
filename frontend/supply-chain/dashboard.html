<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supply Chain Dashboard - Green Era</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="#"><i class="bi bi-truck"></i> Green Era <span class="badge bg-warning ms-2">Supply Chain</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="deals.html" class="nav-link"><i class="bi bi-check2-all me-2"></i>Approved Deals</a>
        <a href="deliveries.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>Deliveries</a>
      </div>
      <hr>
      <div class="px-3"><small class="text-muted">Notifications</small><div id="scNotifBadge" class="mt-1"></div></div>
      <hr>
      <div class="px-3"><a href="../dashboard.html" class="nav-link"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
    </nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Supply Chain Dashboard</h1></div>
        <div class="row g-3 mb-4" id="kpiCards">
          <div class="col-md-3"><div class="card bg-primary bg-opacity-10 border-primary"><div class="card-body text-center"><h3 class="fw-bold text-primary" id="kpiToday">0</h3><small class="text-muted">Today's Pickups</small></div></div></div>
          <div class="col-md-3"><div class="card bg-warning bg-opacity-10 border-warning"><div class="card-body text-center"><h3 class="fw-bold text-warning" id="kpiPending">0</h3><small class="text-muted">Pending Collections</small></div></div></div>
          <div class="col-md-3"><div class="card bg-success bg-opacity-10 border-success"><div class="card-body text-center"><h3 class="fw-bold text-success" id="kpiCompleted">0</h3><small class="text-muted">Completed Collections</small></div></div></div>
          <div class="col-md-3"><div class="card bg-info bg-opacity-10 border-info"><div class="card-body text-center"><h3 class="fw-bold text-info" id="kpiAssigned">0</h3><small class="text-muted">Assigned Pickups</small></div></div></div>
        </div>
        <div class="row g-3 mb-4">
          <div class="col-md-6"><div class="card"><div class="card-header"><h6 class="mb-0 fw-bold"><i class="bi bi-graph-up me-2"></i>Collection Trend</h6></div><div class="card-body"><canvas id="trendChart" height="120"></canvas></div></div></div>
          <div class="col-md-6"><div class="card"><div class="card-header"><h6 class="mb-0 fw-bold"><i class="bi bi-pie-chart me-2"></i>Branch Distribution</h6></div><div class="card-body"><canvas id="branchChart" height="120"></canvas></div></div></div>
        </div>
        <div class="card"><div class="card-header"><h6 class="mb-0 fw-bold"><i class="bi bi-list-check me-2"></i>Recent Deals</h6></div>
        <div class="card-body" id="recentDeals"><p class="text-muted">Loading...</p></div></div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (async function() {
    const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
    if (!token) { window.location.href = '../login.html'; return; }
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const [dashRes, dealsRes] = await Promise.all([
        fetch('/api/supply-chain/dashboard', { headers }),
        fetch('/api/supply-chain/deals?limit=10', { headers })
      ]);
      const dash = await dashRes.json();
      const deals = await dealsRes.json();

      document.getElementById('kpiToday').textContent = dash.today_pickups || 0;
      document.getElementById('kpiPending').textContent = dash.pending_collections || 0;
      document.getElementById('kpiCompleted').textContent = dash.completed_collections || 0;
      document.getElementById('kpiAssigned').textContent = dash.assigned_pickups || 0;

      let html = '<table class="table table-sm"><thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      (deals.deals || []).forEach(d => {
        html += `<tr><td>#${d.id}</td><td>${d.customer_name || '-'}</td><td>${d.product_catalog?.name || d.brand || '-'}</td><td><span class="badge bg-${d.status === 'hub_assigned' ? 'warning' : d.status === 'supply_chain_assigned' ? 'info' : d.status === 'otp_verified' ? 'success' : 'secondary'}">${d.status}</span></td>
        <td><a href="deals.html?id=${d.id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a></td></tr>`;
      });
      html += '</tbody></table>';
      if (!deals.deals?.length) html = '<p class="text-muted">No deals assigned yet</p>';
      document.getElementById('recentDeals').innerHTML = html;

      new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
          labels: dash.collection_trend?.map(t => t.month) || ['Jan', 'Feb', 'Mar'],
          datasets: [{
            label: 'Collections',
            data: dash.collection_trend?.map(t => t.count) || [0, 0, 0],
            borderColor: '#16A34A',
            backgroundColor: 'rgba(22,163,74,0.1)',
            fill: true,
            tension: 0.3,
          }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      new Chart(document.getElementById('branchChart'), {
        type: 'doughnut',
        data: {
          labels: dash.branch_distribution?.map(b => b.hub_name) || ['Not assigned'],
          datasets: [{
            data: dash.branch_distribution?.map(b => b.count) || [1],
            backgroundColor: ['#16A34A', '#3B82F6', '#F59E0B', '#EF4444', '#8B5CF6'],
          }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
      });
      async function loadNotifBadge() {
        try {
          const r = await fetch('/api/notifications/unread-count', { headers: { 'Authorization': 'Bearer ' + token } });
          const d = await r.json();
          document.getElementById('scNotifBadge').innerHTML = '<span class="badge bg-danger">' + (d.count || 0) + ' new</span>';
        } catch(e) { /* ignore */ }
      }
      loadNotifBadge();
    } catch(e) { document.getElementById('recentDeals').innerHTML = '<p class="text-danger">Failed to load</p>'; }
  })();
  </script>
</body>
</html>
