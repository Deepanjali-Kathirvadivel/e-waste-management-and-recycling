<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Closed Deals - Supply Chain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-truck"></i> Green Era <span class="badge bg-warning ms-2">Supply Chain</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <a class="text-dark text-decoration-none position-relative" href="../notifications.html" id="notifBellSC" title="Notifications">
          <i class="bi bi-bell fs-5 text-green"></i>
          <span id="scNotifCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;font-size:9px">0</span>
        </a>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="../profile.html"><i class="bi bi-person me-2"></i>My Profile</a></li>
            <li><a class="dropdown-item" href="../notifications.html"><i class="bi bi-bell me-2"></i>Notifications</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="approved-deals.html" class="nav-link"><i class="bi bi-check2-all me-2"></i>Approved Deals</a>
        <a href="closed-deals.html" class="nav-link active"><i class="bi bi-hand-thumbs-up me-2"></i>Closed Deals</a>
        <a href="history.html" class="nav-link"><i class="bi bi-check-circle me-2"></i>History</a>
        <hr>
      </div></nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center flex-wrap gap-2">
          <h1 class="h4 mb-0"><i class="bi bi-hand-thumbs-up me-2"></i>Closed Deals</h1>
          <div class="d-flex gap-2 flex-wrap">
            <select class="form-select form-select-sm" id="regionFilter" onchange="loadPickups(1)" style="width:auto;min-width:140px">
              <option value="">All Regions</option>
            </select>
            <select class="form-select form-select-sm" id="statusFilter" onchange="loadPickups(1)" style="width:auto">
              <option value="">All Active</option>
              <option value="collected">Collected</option>
              <option value="in_transit">In Transit</option>
            </select>
            <button class="btn btn-sm btn-outline-primary-green" onclick="loadPickups(currentPage)"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>
        <div id="pickupsContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>

  <!-- Deliver to Hub Modal (Product Delivered) -->
  <div class="modal fade" id="deliverModal" tabindex="-1"><div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="bi bi-building me-2"></i>Product Delivered</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <p class="small text-muted">Hub operator verifies the delivery</p>
      <div class="mb-2 form-check"><input type="checkbox" class="form-check-input" id="deliverProductOk" checked><label class="form-check-label small">Product OK</label></div>
      <div class="mb-2 form-check"><input type="checkbox" class="form-check-input" id="deliverQtyOk" checked><label class="form-check-label small">Quantity matches</label></div>
      <div class="mb-2 form-check"><input type="checkbox" class="form-check-input" id="deliverSerialOk" checked><label class="form-check-label small">Serial number matches</label></div>
      <div class="mb-2 form-check"><input type="checkbox" class="form-check-input" id="deliverConditionOk" checked><label class="form-check-label small">Condition acceptable</label></div>
      <div class="mb-2"><label class="form-label small">Notes</label><textarea class="form-control form-control-sm" id="deliverNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success btn-sm" onclick="confirmDeliver()"><i class="bi bi-check-lg me-1"></i>Deliver</button></div>
  </div></div></div>

  <!-- Exception Modal -->
  <div class="modal fade" id="exceptionModal" tabindex="-1"><div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2 text-danger"></i>Report Exception</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-2"><label class="form-label small">Exception Type <span class="text-danger">*</span></label><select class="form-select form-select-sm" id="exceptionType">
        <option value="requires_manager_review">Product Condition Changed</option>
        <option value="transport_delayed">Transport Delayed</option>
        <option value="delivery_exception">Delivery Exception</option>
      </select></div>
      <div class="mb-2"><label class="form-label small">Reason <span class="text-danger">*</span></label><textarea class="form-control form-control-sm" id="exceptionReason" rows="3" placeholder="Describe the issue..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button><button class="btn btn-danger btn-sm" onclick="confirmException()"><i class="bi bi-flag me-1"></i>Report Exception</button></div>
  </div></div></div>

  <!-- Pickup Detail Modal -->
  <div class="modal fade" id="pickupDetailModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Pickup <span id="pickupDetailTitle">#0</span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="pickupDetailBody">Loading...</div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentPickupId = null, currentPage = 1, totalPages = 1;
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; }
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  const STATUS_COLORS = { collected:'secondary', in_transit:'warning', delivered:'success', received:'success', customer_unavailable:'danger', otp_failed:'danger', customer_cancelled:'danger', requires_manager_review:'warning', transport_delayed:'warning', delivery_exception:'danger', cancelled:'danger' };
  const CLOSED_FLOW = ['collected', 'in_transit'];

  // Load regions for filter dropdown
  (async function loadRegions() {
    try {
      const r = await fetch(API_BASE + '/supply-chain/regions', { headers });
      const data = await r.json();
      const sel = document.getElementById('regionFilter');
      (data.regions || []).forEach(rg => {
        const opt = document.createElement('option');
        opt.value = rg.id; opt.textContent = rg.name;
        sel.appendChild(opt);
      });
    } catch(e) {}
  })();

  async function loadPickups(page) {
    try {
      const status = document.getElementById('statusFilter').value;
      const region = document.getElementById('regionFilter').value;
      let url = API_BASE + '/supply-chain/pickups?page=' + (page || currentPage) + '&limit=20';
      const activeStatuses = 'collected,in_transit';
      url += '&status=' + (status || activeStatuses);
      if (region) url += '&region_id=' + region;
      const res = await fetch(url, { headers });
      const data = await res.json();
      currentPage = data.page || 1; totalPages = data.total_pages || 1;
      let html = '<div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-light"><tr><th>Deal ID</th><th>Customer Name</th><th>Product Name</th><th>Collection Date</th><th>Approved Amount</th><th>Collection Center</th><th>Actions</th></tr></thead><tbody>';
      (data.pickups || data.deals || []).forEach(d => {
        const color = STATUS_COLORS[d.status] || 'secondary';
        const actions = getActionButtons(d);
        const colDate = d.collection_time ? new Date(d.collection_time).toLocaleDateString('en-IN') : '-';
        html += `<tr>
          <td>#${d.id}</td>
          <td>${d.customer_name || '-'}</td>
          <td>${d.product_catalog?.name || d.brand || '-'}</td>
          <td>${colDate}</td>
          <td class="fw-bold">\u20B9${(d.hr_approved_value||d.value_estimate||0).toLocaleString('en-IN')}</td>
          <td>${d.assigned_hub?.name || '-'}</td>
          <td style="min-width:180px">${actions}</td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      if (totalPages > 1) {
        html += `<nav><ul class="pagination pagination-sm justify-content-center"><li class="page-item ${currentPage<=1?'disabled':''}"><a class="page-link" href="#" onclick="loadPickups(${currentPage-1});return false">Prev</a></li>
          <li class="page-item disabled"><span class="page-link">${currentPage}/${totalPages}</span></li>
          <li class="page-item ${currentPage>=totalPages?'disabled':''}"><a class="page-link" href="#" onclick="loadPickups(${currentPage+1});return false">Next</a></li></ul></nav>`;
      }
      document.getElementById('pickupsContent').innerHTML = html || '<div class="alert alert-info mb-0"><i class="bi bi-info-circle me-2"></i>No closed deals waiting for delivery.</div>';
      try { const nr = await fetch(API_BASE + '/notifications/unread-count', { headers }); const nd = await nr.json(); const b = document.getElementById('scNotifCount'); if (nd.count>0) { b.textContent=nd.count; b.style.display=''; } else b.style.display='none'; } catch(e) {}
    } catch(e) { document.getElementById('pickupsContent').innerHTML = '<p class="text-danger">Failed: ' + e.message + '</p>'; }
  }

  function getActionButtons(d) {
    const s = d.status;
    const btns = [];
    const push = (label, cls, fn) => btns.push(`<button class="btn btn-sm ${cls} mb-1" onclick="${fn}">${label}</button>`);
    const currentUserId = (JSON.parse(localStorage.getItem('greenera_user') || '{}')).id || 0;
    const isAssignedToMe = d.supply_chain_user_id === currentUserId;

    if (isAssignedToMe && (s === 'collected' || s === 'in_transit')) {
      push('Product Delivered', 'btn-outline-dark', 'openDeliver('+d.id+')');
    }

    if (['collected','delivered','received','completed'].includes(s)) {
      push('<i class="bi bi-file-pdf"></i>', 'btn-outline-success', 'downloadReceipt('+d.id+')');
    }

    if (CLOSED_FLOW.includes(s)) {
      push('Exception', 'btn-outline-danger', 'openException('+d.id+')');
    }

    push('<i class="bi bi-eye"></i>', 'btn-outline-secondary', 'viewPickup('+d.id+')');
    return btns.join(' ');
  }

  // ───── Download Receipt ─────
  window.downloadReceipt = async function(id) {
    try { const r = await fetch(API_BASE + '/supply-chain/pickups/'+id+'/receipt', { headers: { 'Authorization':'Bearer '+token } }); if (!r.ok) throw new Error((await r.json()).error); const blob = await r.blob(); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download='receipt-'+id+'.pdf'; a.click(); URL.revokeObjectURL(url); }
    catch(e) { showToast(e.message, 'error'); }
  };

  // ───── Deliver to Hub ─────
  window.openDeliver = function(id) {
    currentPickupId = id;
    document.getElementById('deliverProductOk').checked = true;
    document.getElementById('deliverQtyOk').checked = true;
    document.getElementById('deliverSerialOk').checked = true;
    document.getElementById('deliverConditionOk').checked = true;
    document.getElementById('deliverNotes').value = '';
    new bootstrap.Modal(document.getElementById('deliverModal')).show();
  };

  window.confirmDeliver = async function() {
    const productOk = document.getElementById('deliverProductOk').checked;
    const qtyOk = document.getElementById('deliverQtyOk').checked;
    const serialOk = document.getElementById('deliverSerialOk').checked;
    const conditionOk = document.getElementById('deliverConditionOk').checked;
    if (!productOk || !qtyOk || !serialOk || !conditionOk) {
      if (!confirm('Some checks failed. Mark as delivery exception?')) return;
    }
    try {
      const r = await fetch(API_BASE + '/supply-chain/pickups/'+currentPickupId+'/deliver', { method:'POST', headers, body: JSON.stringify({
        product_ok: productOk, quantity_ok: qtyOk, serial_ok: serialOk, condition_ok: conditionOk,
        notes: document.getElementById('deliverNotes').value,
      })});
      if (!r.ok) throw new Error((await r.json()).error);
      bootstrap.Modal.getInstance(document.getElementById('deliverModal')).hide();
      showToast('Product delivered to hub!');
      loadPickups(currentPage);
    } catch(e) { showToast(e.message, 'error'); }
  };

  // ───── Exceptions ─────
  window.openException = function(id) {
    currentPickupId = id;
    document.getElementById('exceptionType').value = 'requires_manager_review';
    document.getElementById('exceptionReason').value = '';
    new bootstrap.Modal(document.getElementById('exceptionModal')).show();
  };

  window.confirmException = async function() {
    const type = document.getElementById('exceptionType').value;
    const reason = document.getElementById('exceptionReason').value;
    if (!reason) { showToast('Please provide a reason', 'error'); return; }
    try {
      const r = await fetch(API_BASE + '/supply-chain/pickups/'+currentPickupId+'/exception', { method:'POST', headers, body: JSON.stringify({ exception_type: type, reason }) });
      if (!r.ok) throw new Error((await r.json()).error);
      bootstrap.Modal.getInstance(document.getElementById('exceptionModal')).hide();
      showToast('Exception reported!');
      loadPickups(currentPage);
    } catch(e) { showToast(e.message, 'error'); }
  };

  // ───── View Detail ─────
  window.viewPickup = async function(id) {
    try {
      const r = await fetch(API_BASE + '/supply-chain/pickups/'+id, { headers });
      const data = await r.json();
      const p = data.pickup || data.deal || data;
      document.getElementById('pickupDetailTitle').textContent = '#' + p.id;
      const moves = p.movement_history || [];
      const color = STATUS_COLORS[p.status] || 'secondary';
      let html = `<div class="row g-3">
        <div class="col-md-6"><h6 class="fw-bold text-green border-bottom pb-1">Customer</h6><p class="mb-0"><strong>${p.customer_name||'-'}</strong></p><small class="text-muted">${p.customer_phone||''} ${p.customer_email?'| '+p.customer_email:''}<br>${p.customer_address||''}</small></div>
        <div class="col-md-6"><h6 class="fw-bold text-green border-bottom pb-1">Product</h6><p class="mb-0"><strong>${p.product_catalog?.name||p.brand||'-'} ${p.model||''}</strong></p><small class="text-muted">${p.condition||'-'} | ${p.weight_kg||'-'} kg<br>Serial: ${p.serial_number||'-'}</small></div>
        <div class="col-12"><hr class="my-1"></div>
        <div class="col-md-3"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Approved Value</small><h5 class="fw-bold mb-0">\u20B9${(p.hr_approved_value||p.value_estimate||0).toLocaleString('en-IN')}</h5></div></div>
        <div class="col-md-3"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Status</small><h5 class="mb-0"><span class="badge bg-${color} fs-6">${p.status.replace(/_/g,' ')}</span></h5></div></div>
        <div class="col-md-3"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Hub</small><h5 class="fw-bold mb-0 small">${p.assigned_hub?.name||'-'}</h5></div></div>
        <div class="col-md-3"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Executive</small><h5 class="fw-bold mb-0 small">${p.supply_chain_user?.full_name||p.supply_chain_user?.username||'-'}</h5></div></div>
        <div class="col-md-6"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Assigned Manager</small><h6 class="fw-bold mb-0">${p.approver?.full_name || '-'}</h6></div></div>
        <div class="col-md-6"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Approved Date</small><h6 class="fw-bold mb-0">${p.hr_acted_at ? new Date(p.hr_acted_at).toLocaleDateString('en-IN') : '-'}</h6></div></div>
        ${p.exception_reason ? `<div class="col-12"><div class="alert alert-danger py-2 mb-0 small"><strong>Exception:</strong> ${p.exception_reason}</div></div>` : ''}
        <div class="col-12"><hr class="my-1"><h6 class="fw-bold text-green">Movement History</h6><div class="timeline small" style="max-height:200px;overflow-y:auto">${
          moves.length ? moves.reverse().map(m => `<div class="d-flex gap-2 mb-1"><i class="bi bi-circle-fill text-green" style="font-size:8px;margin-top:6px"></i><div><span class="fw-bold">${(m.action||'').replace(/_/g,' ')}</span><br><span class="text-muted">${new Date(m.timestamp||Date.now()).toLocaleString()}</span></div></div>`).join('')
          : '<span class="text-muted">No movement history</span>'}</div></div>
      </div>`;
      document.getElementById('pickupDetailBody').innerHTML = html;
      new bootstrap.Modal(document.getElementById('pickupDetailModal')).show();
    } catch(e) { showToast('Failed to load pickup', 'error'); }
  };

  // ───── Init ─────
  loadPickups(1);
  </script>
</body>
</html>
