<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deliveries - Supply Chain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-truck"></i> Green Era <span class="badge bg-warning ms-2">Supply Chain</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="deals.html" class="nav-link"><i class="bi bi-check2-all me-2"></i>Approved Deals</a>
        <a href="deliveries.html" class="nav-link active"><i class="bi bi-check-circle me-2"></i>Deliveries</a>
      </div>
      <hr>
      <div class="px-3"><small class="text-muted">Notifications</small><div id="scNotifBadge" class="mt-1"></div></div>
    </nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4">Completed Deliveries</h1></div>
        <div id="deliveryContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>
  <!-- QR Code Modal -->
  <div class="modal fade" id="qrModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Product QR Code</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body text-center">
          <div id="qrCodeDisplay"></div>
          <p class="text-muted mt-2 small">Scan at hub to receive this item</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentPage = 1, totalPages = 1;
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; return; }

  window.downloadReceipt = async function(id) {
    try {
      const res = await fetch('/api/supply-chain/deals/' + id + '/receipt', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error((await res.json()).error);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'receipt-' + id + '.pdf';
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Error: ' + e.message); }
  };

  window.showQR = async function(id) {
    const qrContainer = document.getElementById('qrCodeDisplay');
    qrContainer.innerHTML = '';
    const qrData = JSON.stringify({ id: id, deal: 'DEAL-' + String(id).padStart(6, '0'), receipt: 'RCPT-' + String(id).padStart(6, '0') });
    if (typeof QRCode !== 'undefined') {
      new QRCode(qrContainer, { text: qrData, width: 180, height: 180 });
    }
    new bootstrap.Modal(document.getElementById('qrModal')).show();
  };

  async function loadDeliveries(page) {
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const res = await fetch('/api/supply-chain/deliveries?page=' + (page || currentPage) + '&limit=15', { headers });
      const data = await res.json();
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;
      let html = '<table class="table table-hover"><thead><tr><th>Deal No</th><th>Customer</th><th>Product</th><th>Status</th><th>Hub</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
      (data.deliveries || []).forEach(d => {
        html += `<tr>
          <td>${d.deal_number || 'N/A'}</td>
          <td>${d.customer_name || '-'}</td>
          <td>${d.product_catalog?.name || d.brand || '-'}</td>
          <td><span class="badge bg-${d.status === 'delivered_to_hub' ? 'primary' : d.status === 'received' ? 'success' : 'secondary'}">${d.status.replace(/_/g, ' ')}</span></td>
          <td>${d.assigned_hub?.name || '-'}</td>
          <td>${d.deal_closed_at ? new Date(d.deal_closed_at).toLocaleDateString() : '-'}</td>
          <td>
            <button class="btn btn-sm btn-outline-success" onclick="downloadReceipt(${d.id})" title="Download Receipt PDF"><i class="bi bi-file-pdf"></i></button>
            <button class="btn btn-sm btn-outline-info" onclick="showQR(${d.id})" title="Show QR Code"><i class="bi bi-qr-code"></i></button>
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
      if (totalPages > 1) {
        html += '<nav><ul class="pagination pagination-sm justify-content-center mt-3">';
        html += '<li class="page-item ' + (currentPage <= 1 ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadDeliveries(' + (currentPage - 1) + ');return false">Previous</a></li>';
        html += '<li class="page-item disabled"><span class="page-link">Page ' + currentPage + ' of ' + totalPages + '</span></li>';
        html += '<li class="page-item ' + (currentPage >= totalPages ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadDeliveries(' + (currentPage + 1) + ');return false">Next</a></li>';
        html += '</ul></nav>';
      }
      if (!data.deliveries?.length) html = '<div class="alert alert-info">No completed deliveries</div>';
      document.getElementById('deliveryContent').innerHTML = html;
    } catch(e) { document.getElementById('deliveryContent').innerHTML = '<p class="text-danger">Failed to load</p>'; }
  }

  async function loadNotifBadge() {
    try {
      const r = await fetch('/api/notifications/unread-count', { headers: { 'Authorization': 'Bearer ' + token } });
      const d = await r.json();
      document.getElementById('scNotifBadge').innerHTML = '<span class="badge bg-danger">' + (d.count || 0) + ' new</span>';
    } catch(e) { /* ignore */ }
  }

  loadDeliveries(1);
  loadNotifBadge();
  </script>
</body>
</html>
