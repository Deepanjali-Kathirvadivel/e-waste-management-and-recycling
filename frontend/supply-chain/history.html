<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Supply Chain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-truck"></i> Green Era <span class="badge bg-warning ms-2">Supply Chain</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline" id="dashboardDate"></span>
        <a class="text-dark text-decoration-none position-relative" href="#" id="notifBellSC" title="Notifications">
          <i class="bi bi-bell fs-5 text-green"></i>
          <span id="scNotifCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;font-size:9px">0</span>
        </a>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar"><div class="pt-4">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="approved-deals.html" class="nav-link"><i class="bi bi-check2-all me-2"></i>Approved Deals</a>
        <a href="closed-deals.html" class="nav-link"><i class="bi bi-hand-thumbs-up me-2"></i>Closed Deals</a>
        <a href="history.html" class="nav-link active"><i class="bi bi-check-circle me-2"></i>History</a>
        <hr>
      </div></nav>
      <main class="col-md-10 ms-sm-auto px-4">
        <div class="pt-4 pb-2 mb-3 border-bottom"><h1 class="h4 mb-0"><i class="bi bi-clock-history me-2"></i>Pickup History</h1></div>

        <!-- Filters -->
        <div class="card shadow-sm mb-3"><div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-md-2"><label class="form-label small">Status</label><select class="form-select form-select-sm" id="filterStatus"><option value="">All</option><option value="received" selected>Received</option><option value="delivered">Delivered</option><option value="ready_for_processing">Processing</option><option value="completed">Completed</option><option value="customer_unavailable">Unavailable</option><option value="customer_cancelled">Cancelled</option><option value="otp_failed">OTP Failed</option><option value="requires_manager_review">Manager Review</option><option value="transport_delayed">Delayed</option><option value="delivery_exception">Exception</option><option value="cancelled">Cancelled</option></select></div>
            <div class="col-md-2"><label class="form-label small">From</label><input type="date" class="form-control form-control-sm" id="filterDateFrom"></div>
            <div class="col-md-2"><label class="form-label small">To</label><input type="date" class="form-control form-control-sm" id="filterDateTo"></div>
            <div class="col-md-3"><label class="form-label small">Search</label><input class="form-control form-control-sm" id="filterSearch" placeholder="Customer, phone, deal #"></div>
            <div class="col-md-1"><button class="btn btn-sm btn-primary w-100" onclick="loadHistory(1)"><i class="bi bi-search"></i></button></div>
            <div class="col-md-2"><button class="btn btn-sm btn-outline-success w-100" onclick="exportHistory()"><i class="bi bi-download me-1"></i>Export</button></div>
          </div>
        </div></div>

        <!-- Summary -->
        <div class="row g-2 mb-3" id="historySummary"></div>

        <!-- Table -->
        <div id="historyContent"><p class="text-muted">Loading...</p></div>
      </main>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="historyDetailModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Pickup <span id="historyDetailTitle">#0</span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="historyDetailBody">Loading...</div>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  let currentPage = 1, totalPages = 1;
  const token = localStorage.getItem('greenera_token') || sessionStorage.getItem('greenera_token');
  if (!token) { window.location.href = '../login.html'; }
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

  const STATUS_COLORS = { delivered:'success', received:'success', ready_for_processing:'info', completed:'success', customer_unavailable:'danger', otp_failed:'danger', customer_cancelled:'danger', requires_manager_review:'warning', transport_delayed:'warning', delivery_exception:'danger', cancelled:'danger' };

  async function loadHistory(page) {
    try {
      const params = new URLSearchParams({ page: page || 1, limit: 20 });
      const status = document.getElementById('filterStatus').value;
      const from = document.getElementById('filterDateFrom').value;
      const to = document.getElementById('filterDateTo').value;
      const search = document.getElementById('filterSearch').value;
      if (status) params.set('status', status);
      if (from) params.set('date_from', from);
      if (to) params.set('date_to', to);
      if (search) params.set('search', search);
      const res = await fetch(API_BASE + '/supply-chain/history?' + params.toString(), { headers });
      const data = await res.json();
      currentPage = data.page || 1; totalPages = data.total_pages || 1;

      // Summary cards
      let totalCompleted = 0, totalExceptions = 0;
      (data.history || []).forEach(h => {
        if (['delivered','received','ready_for_processing','completed'].includes(h.status)) totalCompleted++;
        else totalExceptions++;
      });
      document.getElementById('historySummary').innerHTML = `
        <div class="col-md-3 col-6"><div class="card border-0 bg-light"><div class="card-body text-center py-2"><div class="fw-bold">${data.total || 0}</div><small class="text-muted">Total Pickups</small></div></div></div>
        <div class="col-md-3 col-6"><div class="card border-0 bg-success bg-opacity-10"><div class="card-body text-center py-2"><div class="fw-bold text-success">${totalCompleted}</div><small class="text-muted">Successful</small></div></div></div>
        <div class="col-md-3 col-6"><div class="card border-0 bg-danger bg-opacity-10"><div class="card-body text-center py-2"><div class="fw-bold text-danger">${totalExceptions}</div><small class="text-muted">Exceptions</small></div></div></div>
        <div class="col-md-3 col-6"><div class="card border-0 bg-info bg-opacity-10"><div class="card-body text-center py-2"><div class="fw-bold text-info">${data.total ? Math.round(totalCompleted/data.total*100) : 0}%</div><small class="text-muted">Success Rate</small></div></div></div>
      `;

      let html = '<div class="table-responsive"><table class="table table-hover align-middle small"><thead class="table-light"><tr><th>Pickup Date</th><th>Delivery Date</th><th>Customer</th><th>Product</th><th>Amount</th><th>Hub</th><th>Executive</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      (data.history || data.deliveries || []).forEach(h => {
        const color = STATUS_COLORS[h.status] || 'secondary';
        const pickupDate = h.scheduled_pickup_date ? new Date(h.scheduled_pickup_date).toLocaleDateString('en-IN') : (h.collection_time ? new Date(h.collection_time).toLocaleDateString('en-IN') : '-');
        const deliveryDate = h.deal_closed_at ? new Date(h.deal_closed_at).toLocaleDateString('en-IN') : (['delivered_to_hub', 'delivered', 'received', 'completed'].includes(h.status) && h.updatedAt ? new Date(h.updatedAt).toLocaleDateString('en-IN') : '-');
        html += `<tr>
          <td><small>${pickupDate}</small></td>
          <td><small>${deliveryDate}</small></td>
          <td>${h.customer_name||'-'}<br><small class="text-muted">${h.customer_phone||''}</small></td>
          <td>${h.product_catalog?.name||h.brand||'-'}</td>
          <td>₹${(h.hr_approved_value||h.value_estimate||0).toLocaleString('en-IN')}</td>
          <td>${h.assigned_hub?.name||'-'}</td>
          <td>${h.supply_chain_user?.full_name||h.supply_chain_user?.username||'-'}</td>
          <td><span class="badge bg-${color}">${h.status.replace(/_/g,' ')}</span></td>
          <td><button class="btn btn-sm btn-outline-secondary" onclick="viewDetail(${h.id})"><i class="bi bi-eye"></i></button></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      if (totalPages > 1) {
        html += `<nav><ul class="pagination pagination-sm justify-content-center"><li class="page-item ${currentPage<=1?'disabled':''}"><a class="page-link" href="#" onclick="loadHistory(${currentPage-1});return false">Prev</a></li>
          <li class="page-item disabled"><span class="page-link">${currentPage}/${totalPages}</span></li>
          <li class="page-item ${currentPage>=totalPages?'disabled':''}"><a class="page-link" href="#" onclick="loadHistory(${currentPage+1});return false">Next</a></li></ul></nav>`;
      }
      document.getElementById('historyContent').innerHTML = html || '<div class="alert alert-info">No history found</div>';
      try { const nr = await fetch(API_BASE + '/notifications/unread-count', { headers }); const nd = await nr.json(); const b = document.getElementById('scNotifCount'); if (nd.count>0) { b.textContent=nd.count; b.style.display=''; } else b.style.display='none'; } catch(e) {}
    } catch(e) { document.getElementById('historyContent').innerHTML = '<p class="text-danger">Failed: '+e.message+'</p>'; }
  }

  window.viewDetail = async function(id) {
    try {
      const r = await fetch(API_BASE + '/supply-chain/pickups/'+id, { headers });
      const data = await r.json();
      const p = data.pickup || data.deal || data;
      document.getElementById('historyDetailTitle').textContent = '#' + p.id;
      const moves = p.movement_history || [];
      const color = STATUS_COLORS[p.status] || 'secondary';
      let html = `<div class="row g-3">
        <div class="col-md-6"><h6 class="fw-bold text-green border-bottom pb-1">Customer</h6><p class="mb-0"><strong>${p.customer_name||'-'}</strong></p><small class="text-muted">${p.customer_phone||''} ${p.customer_email?'| '+p.customer_email:''}</small></div>
        <div class="col-md-6"><h6 class="fw-bold text-green border-bottom pb-1">Product</h6><p class="mb-0"><strong>${p.product_catalog?.name||p.brand||'-'} ${p.model||''}</strong></p><small class="text-muted">${p.condition||'-'} | ${p.weight_kg||'-'} kg</small></div>
        <div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Approved Value</small><h5 class="fw-bold mb-0">\u20B9${(p.hr_approved_value||p.value_estimate||0).toLocaleString('en-IN')}</h5></div></div>
        <div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Status</small><h5 class="mb-0"><span class="badge bg-${color} fs-6">${p.status.replace(/_/g,' ')}</span></h5></div></div>
        <div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Hub</small><h5 class="fw-bold mb-0 small">${p.assigned_hub?.name||'-'}</h5></div></div>
        ${p.supply_chain_user ? `<div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Executive</small><h5 class="fw-bold mb-0 small">${p.supply_chain_user.full_name||p.supply_chain_user.username||'-'}</h5></div></div>` : ''}
        ${p.deal_closed_at ? `<div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Completed</small><h5 class="fw-bold mb-0 small">${new Date(p.deal_closed_at).toLocaleDateString('en-IN')}</h5></div></div>` : ''}
        ${p.vehicle_number ? `<div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Vehicle</small><h5 class="fw-bold mb-0 small">${p.vehicle_number||'-'}</h5></div></div>` : ''}
        ${p.driver_name ? `<div class="col-md-4"><div class="p-2 bg-light rounded text-center"><small class="text-muted">Driver</small><h5 class="fw-bold mb-0 small">${p.driver_name||'-'}</h5></div></div>` : ''}
        ${p.exception_reason ? `<div class="col-12"><div class="alert alert-danger py-2 mb-0 small"><strong>Exception:</strong> ${p.exception_reason}</div></div>` : ''}
        ${p.analysis_result ? `<div class="col-12"><hr class="my-1"><h6 class="fw-bold text-green">Analysis Result</h6><div class="row g-2 small"><div class="col-3">Classification: <span class="fw-bold">${p.analysis_result.classification||'-'}</span></div><div class="col-3">Recovery: <span class="fw-bold">${p.analysis_result.recovery_potential||0}%</span></div><div class="col-3">Revenue: <span class="fw-bold">\u20B9${(p.analysis_result.estimated_revenue||0).toLocaleString('en-IN')}</span></div><div class="col-3">Material: <span class="fw-bold">${p.analysis_result.material_recovery_percentage||0}%</span></div></div></div>` : ''}
        <div class="col-12"><hr class="my-1"><h6 class="fw-bold text-green">Movement History</h6><div class="timeline small" style="max-height:200px;overflow-y:auto">${
          moves.length ? moves.reverse().map(m => `<div class="d-flex gap-2 mb-1"><i class="bi bi-circle-fill text-green" style="font-size:8px;margin-top:6px"></i><div><span class="fw-bold">${(m.action||'').replace(/_/g,' ')}</span><br><span class="text-muted">${new Date(m.timestamp||Date.now()).toLocaleString()}</span></div></div>`).join('')
          : '<span class="text-muted">No movement history</span>'}</div></div>
      </div>`;
      document.getElementById('historyDetailBody').innerHTML = html;
      new bootstrap.Modal(document.getElementById('historyDetailModal')).show();
    } catch(e) { showToast('Failed to load pickup', 'error'); }
  };

  window.exportHistory = function() {
    const params = new URLSearchParams({ export: 'json', limit: 10000 });
    const status = document.getElementById('filterStatus').value;
    const from = document.getElementById('filterDateFrom').value;
    const to = document.getElementById('filterDateTo').value;
    const search = document.getElementById('filterSearch').value;
    if (status) params.set('status', status);
    if (from) params.set('date_from', from);
    if (to) params.set('date_to', to);
    if (search) params.set('search', search);
    window.open(API_BASE + '/supply-chain/history?' + params.toString(), '_blank');
  };

  loadHistory(1);
  </script>
</body>
</html>
